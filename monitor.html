<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor — Accumulator Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; padding: 20px; }
  h1 { text-align: center; font-size: 1.4rem; color: #58a6ff; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #8b949e; font-size: 0.85rem; margin-bottom: 20px; }

  .summary { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 20px; min-width: 130px; text-align: center; }
  .card .label { font-size: 0.75rem; color: #8b949e; margin-bottom: 4px; }
  .card .value { font-size: 1.4rem; font-weight: bold; }
  .green { color: #3fb950; } .red { color: #f85149; } .blue { color: #58a6ff; } .gray { color: #8b949e; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th { background: #161b22; color: #8b949e; padding: 10px 14px; text-align: left; border-bottom: 1px solid #30363d; white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid #21262d; white-space: nowrap; }
  tr:hover td { background: #161b22; }

  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
  .badge-green { background: #1a3c2a; color: #3fb950; }
  .badge-red   { background: #3c1a1a; color: #f85149; }
  .badge-gray  { background: #21262d; color: #8b949e; }
  .badge-blue  { background: #1a2d3c; color: #58a6ff; }

  .btn { border: none; border-radius: 6px; padding: 5px 14px; font-size: 0.8rem; cursor: pointer; font-weight: bold; transition: opacity .2s; }
  .btn:hover { opacity: 0.8; }
  .btn-stop  { background: #f85149; color: #fff; }
  .btn-start { background: #3fb950; color: #fff; }

  .trades-title { color: #8b949e; font-size: 0.85rem; margin: 24px 0 10px; }
  .trade-row { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 8px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 14px; font-size: 0.82rem; }
  .trade-sym  { color: #58a6ff; font-weight: bold; min-width: 80px; }
  .trade-pnl  { font-weight: bold; min-width: 70px; }
  .trade-time { color: #8b949e; font-size: 0.75rem; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .pulse { animation: pulse 1.2s infinite; }

  .refresh-info { text-align:center; color:#8b949e; font-size:0.75rem; margin-top:14px; }

  .url-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 22px; flex-wrap: wrap; }
  .url-bar input { background: #161b22; border: 1px solid #30363d; color: #e6edf3; border-radius: 8px; padding: 8px 14px; width: 340px; font-size: 0.9rem; }
  .url-bar button { background: #58a6ff; color: #0d1117; border: none; border-radius: 8px; padding: 8px 18px; font-weight: bold; cursor: pointer; }

  .section-title { color: #58a6ff; font-size: 1rem; margin: 20px 0 10px; border-bottom: 1px solid #30363d; padding-bottom: 6px; }
</style>
</head>
<body>

<h1>📊 Monitor — Accumulator Bot</h1>
<p class="subtitle">Atualiza automaticamente a cada 10 segundos</p>

<div class="url-bar">
  <input id="apiUrl" type="text" placeholder="https://seu-bot.railway.app" />
  <button onclick="setUrl()">Conectar</button>
</div>

<!-- Resumo Global -->
<div class="summary">
  <div class="card"><div class="label">Ordens Abertas</div><div class="value blue" id="g-open">—</div></div>
  <div class="card"><div class="label">Total Wins</div><div class="value green" id="g-wins">—</div></div>
  <div class="card"><div class="label">Total Losses</div><div class="value red" id="g-losses">—</div></div>
  <div class="card"><div class="label">Winrate</div><div class="value" id="g-wr">—</div></div>
  <div class="card"><div class="label">PnL Total</div><div class="value" id="g-pnl">—</div></div>
  <div class="card"><div class="label">WebSocket</div><div class="value" id="g-ws">—</div></div>
</div>

<!-- Tabela por Ativo -->
<p class="section-title">📈 Desempenho por Ativo</p>
<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th>Ativo</th>
      <th>Status</th>
      <th>Wins</th>
      <th>Losses</th>
      <th>Winrate</th>
      <th>PnL $</th>
      <th>Ação</th>
    </tr>
  </thead>
  <tbody id="sym-table"></tbody>
</table>
</div>

<!-- Ultimos Trades -->
<p class="section-title">⏱ Últimos 20 Trades</p>
<div id="trades-list"></div>

<p class="refresh-info" id="refresh-info">Aguardando URL do bot...</p>

<script>
const DEFAULT_URL = 'https://web-production-41cb7.up.railway.app';
let BASE_URL = DEFAULT_URL;
document.getElementById('apiUrl').value = BASE_URL;
localStorage.setItem('accu_url', BASE_URL);

function setUrl() {
  BASE_URL = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
  localStorage.setItem('accu_url', BASE_URL);
  refresh();
}

function fmtPnl(v) {
  const cls = v >= 0 ? 'green' : 'red';
  return `<span class="${cls}">${v >= 0 ? '+' : ''}$${Math.abs(v).toFixed(2)}</span>`;
}

function fmtWr(wr) {
  const cls = wr >= 55 ? 'green' : wr >= 45 ? 'blue' : 'red';
  return `<span class="${cls}">${wr}%</span>`;
}

async function fetchJson(path) {
  const r = await fetch(BASE_URL + path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function toggleSymbol(sym, active) {
  const action = active ? 'disable' : 'enable';
  try {
    await fetchJson(`/${action}/${sym}`);
    refresh();
  } catch(e) {
    alert('Erro: ' + e.message);
  }
}

async function refresh() {
  if (!BASE_URL) { document.getElementById('refresh-info').textContent = 'Cole a URL do Railway acima e clique Conectar'; return; }
  try {
    const [root, stats, trades] = await Promise.all([
      fetchJson('/'),
      fetchJson('/stats'),
      fetchJson('/trades'),
    ]);

    // ─ Global ─
    document.getElementById('g-open').textContent   = root.open_orders;
    document.getElementById('g-wins').textContent   = root.wins;
    document.getElementById('g-losses').textContent = root.losses;
    document.getElementById('g-wr').innerHTML       = fmtWr(root.winrate || 0);
    document.getElementById('g-pnl').innerHTML      = fmtPnl(root.total_pnl || 0);
    document.getElementById('g-ws').innerHTML       = root.ws_ready
      ? '<span class="green pulse">● Online</span>'
      : '<span class="red">● Offline</span>';

    // ─ Tabela por ativo ─
    const tbody = document.getElementById('sym-table');
    tbody.innerHTML = '';
    stats.forEach(s => {
      const isActive = s.active;
      const isOpen   = s.is_open;

      const statusBadge = !isActive
        ? '<span class="badge badge-gray">⏸ Pausado</span>'
        : isOpen
          ? '<span class="badge badge-green pulse">● Aberta</span>'
          : '<span class="badge badge-blue">Aguardando</span>';

      const pnlHtml = s.total > 0
        ? fmtPnl(s.pnl)
        : '<span class="gray">—</span>';

      const wrHtml = s.total > 0
        ? fmtWr(s.winrate)
        : '<span class="gray">—</span>';

      const btnLabel = isActive ? '⏸ Pausar' : '▶ Ativar';
      const btnCls   = isActive ? 'btn-stop' : 'btn-start';

      tbody.innerHTML += `
        <tr>
          <td><b>${s.symbol}</b></td>
          <td>${statusBadge}</td>
          <td class="green"><b>${s.wins}</b></td>
          <td class="red"><b>${s.losses}</b></td>
          <td>${wrHtml}</td>
          <td>${pnlHtml}</td>
          <td><button class="btn ${btnCls}" onclick="toggleSymbol('${s.symbol}',${isActive})">${btnLabel}</button></td>
        </tr>`;
    });

    // ─ Ultimos trades ─
    const tlist = document.getElementById('trades-list');
    tlist.innerHTML = '';
    trades.slice(0, 20).forEach(t => {
      const pnl  = t.pnl || 0;
      const badge = pnl >= 0
        ? '<span class="badge badge-green">WIN</span>'
        : '<span class="badge badge-red">LOSS</span>';
      tlist.innerHTML += `
        <div class="trade-row">
          <span class="trade-sym">${t.symbol}</span>
          ${badge}
          <span class="trade-pnl ${pnl >= 0 ? 'green' : 'red'}">${pnl >= 0 ? '+' : ''}$${Math.abs(pnl).toFixed(4)}</span>
          <span class="trade-time">${t.close_time || t.open_time || ''}</span>
        </div>`;
    });

    document.getElementById('refresh-info').textContent =
      `Atualizado: ${new Date().toLocaleTimeString('pt-BR')} — próximo em 10s`;

  } catch(e) {
    document.getElementById('refresh-info').textContent = `❌ Erro de conexão: ${e.message}`;
  }
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
